name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (desktop)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jing-tang-lu-desktop/package-lock.json

      - name: Install desktop deps
        run: npm ci
        working-directory: jing-tang-lu-desktop

      - name: Build desktop
        run: npm run build
        working-directory: jing-tang-lu-desktop

      - name: Setup Node (mobile)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jing-tang-lu-mobile/package-lock.json

      - name: Install mobile deps
        run: npm ci
        working-directory: jing-tang-lu-mobile

      - name: Build mobile
        run: npm run build
        working-directory: jing-tang-lu-mobile

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/desktop
          mkdir -p deploy/mobile
          cp -r jing-tang-lu-desktop/dist/. deploy/desktop/
          cp -r jing-tang-lu-mobile/dist/.  deploy/mobile/
          cp deploy-root/index.html          deploy/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
